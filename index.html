<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeatherApp</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main-container">
      <header>
        <h1>WEATHER FORECAST</h1>
        <p class="subtitle">TODAY & UPCOMING DAYS</p>
      </header>

      <div class="search-box">
        <input type="text" placeholder="Search city..." id="city-input" />
        <button id="search-btn">SEARCH</button>
      </div>

      <main id="weather-content" class="hide">
        <div class="glass-card main-info">
          <div class="location">
            <h2 id="city">London, UK</h2>
            <p id="date">Wednesday, 25 Mar</p>
          </div>
          <div class="temp-container">
            <img src="" alt="Weather Icon" id="weather-icon" />
            <div class="temp-text">
              <span id="temperature">15</span>°C
              <p id="description">Clear Sky</p>
            </div>
          </div>
        </div>

        <div class="details-grid">
          <div class="glass-card detail-item">
            <p>FEELS LIKE</p>
            <span id="feels-like">--</span>
          </div>
          <div class="glass-card detail-item">
            <p>HUMIDITY</p>
            <span id="humidity">--</span>
          </div>
          <div class="glass-card detail-item">
            <p>WIND</p>
            <span id="wind">--</span>
          </div>
          <div class="glass-card detail-item">
            <p>PRESSURE</p>
            <span id="pressure">--</span>
          </div>
          <div class="glass-card detail-item">
            <p>VISIBILITY</p>
            <span id="visibility">--</span>
          </div>
          <div class="glass-card detail-item">
            <p>CLOUDS</p>
            <span id="clouds">--</span>
          </div>
        </div>

        <h3 class="section-title">NEXT 2 DAYS</h3>
        <div class="forecast-container" id="forecast-data"></div>
      </main>

      <div id="error-message" class="hide">
        <p>City not found. Please try again.</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
